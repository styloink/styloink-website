<!DOCTYPE html>
<html>
<head>
<style>
html, body { margin: 0; padding: 0; }
body {
  width: 720pt; height: 405pt;
  box-sizing: border-box;
  padding: 28pt 36pt 28pt 36pt;
  display: flex; flex-direction: column;
  overflow: hidden;
  background: #F8F4EE;
  font-family: Arial, sans-serif;
}
.header { display: flex; align-items: center; gap: 10pt; margin-bottom: 20pt; }
.header-line { width: 4pt; height: 20pt; background: #C4944A; }
.header-title { color: #5C3D2E; font-size: 14pt; font-weight: bold; font-family: Georgia, serif; margin: 0; }
.header-sub { color: #8B5E3C; font-size: 10pt; margin: 0 0 0 8pt; }
.main-row {
  display: grid;
  grid-template-columns: 1fr 180pt;
  gap: 20pt;
  flex: 1 1 0;
  min-height: 0;
}
.left-panel {
  display: flex;
  flex-direction: column;
  gap: 10pt;
  min-height: 0;
}
.dept-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10pt;
  flex: 1 1 0;
  min-height: 0;
}
.dept-card {
  background: #fff;
  border: 1pt solid #D4B896;
  border-left: 4pt solid #8B5E3C;
  border-radius: 3pt;
  padding: 10pt 14pt;
  box-sizing: border-box;
  min-height: 0;
  display: flex;
  flex-direction: column;
  gap: 4pt;
}
.dept-title { color: #5C3D2E; font-size: 11pt; font-weight: bold; font-family: Georgia, serif; margin: 0; }
.dept-desc { color: #7A6050; font-size: 9pt; line-height: 1.5; margin: 0; }
.right-panel {
  background: #5C3D2E;
  border-radius: 4pt;
  padding: 20pt 16pt;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 12pt;
  min-height: 0;
}
.right-top {
  text-align: center;
  border-bottom: 1pt solid #8B5E3C;
  padding-bottom: 12pt;
  margin-bottom: 4pt;
}
.right-brand { color: #F8F4EE; font-size: 18pt; font-weight: bold; font-family: Georgia, serif; margin: 0; letter-spacing: 2pt; }
.right-motto-tag {
  background: #C4944A;
  border-radius: 2pt;
  padding: 3pt 10pt;
  margin: 6pt auto 0 auto;
  display: inline-block;
}
.right-motto { color: #fff; font-size: 9pt; margin: 0; letter-spacing: 1pt; }
.right-item { display: flex; align-items: flex-start; gap: 8pt; }
.right-dot { width: 6pt; height: 6pt; border-radius: 50%; background: #C4944A; margin-top: 3pt; min-width: 6pt; }
.right-text { color: #D4B896; font-size: 10pt; line-height: 1.5; margin: 0; }
</style>
</head>
<body>
<div class="header">
  <div class="header-line"></div>
  <p class="header-title">朴润中医馆</p>
  <p class="header-sub">——&nbsp;传承经典，精于辨证的现代中医实践者</p>
</div>
<div class="main-row">
  <div class="left-panel">
    <div class="dept-grid">
      <div class="dept-card">
        <p class="dept-title">中医内科</p>
        <p class="dept-desc">脾胃病、心脑血管调理等</p>
      </div>
      <div class="dept-card">
        <p class="dept-title">中医妇科</p>
        <p class="dept-desc">月经不调、产后康复等</p>
      </div>
      <div class="dept-card">
        <p class="dept-title">中医骨伤科</p>
        <p class="dept-desc">颈肩腰腿痛专业治疗</p>
      </div>
      <div class="dept-card">
        <p class="dept-title">亚健康调理</p>
        <p class="dept-desc">治未病服务，防未然</p>
      </div>
    </div>
  </div>
  <div class="right-panel">
    <div class="right-top">
      <p class="right-brand">朴润</p>
      <div class="right-motto-tag"><p class="right-motto">上医治未病</p></div>
    </div>
    <div class="right-item">
      <div class="right-dot"></div>
      <p class="right-text">辨证论治，一人一方</p>
    </div>
    <div class="right-item">
      <div class="right-dot"></div>
      <p class="right-text">传统与现代结合</p>
    </div>
    <div class="right-item">
      <div class="right-dot"></div>
      <p class="right-text">注重医患沟通</p>
    </div>
    <div class="right-item">
      <div class="right-dot"></div>
      <p class="right-text">卫生部门批准专业机构</p>
    </div>
  </div>
</div>
</body>
</html>
