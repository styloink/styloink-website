<!DOCTYPE html>
<html>
<head>
<style>
html, body { margin: 0; padding: 0; }
body {
  width: 720pt; height: 405pt;
  box-sizing: border-box;
  padding: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
  background: #F8F4EE;
  font-family: Georgia, serif;
}
.bg-left {
  position: absolute;
  left: 0; top: 0;
  width: 260pt; height: 405pt;
  background: #5C3D2E;
}
.deco-line {
  position: absolute;
  left: 260pt; top: 0;
  width: 6pt; height: 405pt;
  background: #C4944A;
}
.deco-dot {
  position: absolute;
  left: 266pt; top: 180pt;
  width: 8pt; height: 8pt;
  border-radius: 50%;
  background: #C4944A;
}
.left-content {
  position: absolute;
  left: 0; top: 0;
  width: 260pt; height: 405pt;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 0 24pt;
  box-sizing: border-box;
}
.logo-block {
  text-align: center;
}
.right-content {
  position: absolute;
  left: 290pt; top: 0;
  width: 410pt; height: 405pt;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 32pt;
  box-sizing: border-box;
}
.tag {
  background: #C4944A;
  display: inline-block;
  padding: 4pt 14pt;
  border-radius: 2pt;
  margin-bottom: 18pt;
}
.main-title {
  color: #5C3D2E;
  font-size: 26pt;
  font-weight: bold;
  line-height: 1.3;
  margin: 0 0 16pt 0;
  letter-spacing: 1pt;
}
.sub-title {
  color: #8B5E3C;
  font-size: 13pt;
  margin: 0 0 30pt 0;
  letter-spacing: 2pt;
}
.info-row {
  display: flex;
  align-items: center;
  gap: 8pt;
  margin-top: 8pt;
}
.divider {
  width: 40pt;
  height: 1pt;
  background: #C4944A;
  margin-bottom: 20pt;
}
.brand-cn {
  color: #F8F4EE;
  font-size: 22pt;
  font-weight: bold;
  margin: 0 0 4pt 0;
  letter-spacing: 2pt;
}
.brand-sub {
  color: #D4B896;
  font-size: 9pt;
  letter-spacing: 1pt;
  margin: 0;
}
.brand-sep {
  color: #C4944A;
  font-size: 18pt;
  margin: 8pt 0;
}
.date-label {
  color: #8B5E3C;
  font-size: 11pt;
  font-family: Arial, sans-serif;
  margin: 0;
}
.reporter {
  color: #8B5E3C;
  font-size: 11pt;
  font-family: Arial, sans-serif;
  margin: 0;
}
.corner-deco {
  position: absolute;
  right: 18pt; bottom: 18pt;
  width: 50pt; height: 50pt;
  border-right: 2pt solid #C4944A;
  border-bottom: 2pt solid #C4944A;
}
</style>
</head>
<body>
<div class="bg-left"></div>
<div class="deco-line"></div>
<div class="deco-dot"></div>
<div class="left-content">
  <div class="logo-block">
    <p class="brand-cn">泰禾康</p>
    <p class="brand-sub">TAIHE KANG HEALTH</p>
    <p class="brand-sep">&amp;</p>
    <p class="brand-cn">朴润中医馆</p>
    <p class="brand-sub">PURUN TCM CLINIC</p>
  </div>
</div>
<div class="right-content">
  <div class="tag"><p style="color:#F8F4EE;font-size:9pt;font-family:Arial,sans-serif;margin:0;letter-spacing:2pt;">健康管理中心</p></div>
  <p class="main-title">联合运营合作方案</p>
  <div class="divider"></div>
  <p class="sub-title">共创健康新篇章</p>
  <div class="info-row">
    <p class="date-label">2026 / 07 / 02</p>
  </div>
  <div class="info-row">
    <p class="reporter">汇报人：武静</p>
  </div>
</div>
<div class="corner-deco"></div>
</body>
</html>
