<!DOCTYPE html>
<html>
<head>
<style>
html, body { margin: 0; padding: 0; }
body {
  width: 720pt; height: 405pt;
  box-sizing: border-box;
  padding: 26pt 36pt 26pt 36pt;
  display: flex; flex-direction: column;
  overflow: hidden;
  background: #F8F4EE;
  font-family: Arial, sans-serif;
}
.header { display: flex; align-items: center; gap: 10pt; margin-bottom: 18pt; }
.header-line { width: 4pt; height: 20pt; background: #C4944A; }
.header-title { color: #5C3D2E; font-size: 14pt; font-weight: bold; font-family: Georgia, serif; margin: 0; }
.members-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16pt;
  flex: 1 1 0;
  min-height: 0;
}
.member-card {
  background: #fff;
  border: 1pt solid #D4B896;
  border-radius: 4pt;
  padding: 16pt 18pt;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: 8pt;
  min-height: 0;
}
.m-top { display: flex; align-items: center; gap: 12pt; }
.m-avatar {
  width: 44pt; height: 44pt; border-radius: 50%;
  background: #6B4A38;
  display: flex; align-items: center; justify-content: center;
  min-width: 44pt;
}
.m-avatar-text { color: #F8F4EE; font-size: 16pt; font-weight: bold; font-family: Georgia, serif; margin: 0; }
.m-name { color: #5C3D2E; font-size: 14pt; font-weight: bold; font-family: Georgia, serif; margin: 0; }
.m-role { color: #C4944A; font-size: 9pt; margin: 2pt 0 0 0; letter-spacing: 1pt; }
.m-tags { display: flex; gap: 6pt; flex-wrap: wrap; }
.m-tag { background: #F0E8DE; border: 1pt solid #D4B896; border-radius: 2pt; padding: 2pt 8pt; }
.m-tag-text { color: #8B5E3C; font-size: 8.5pt; margin: 0; }
.m-divider { width: 100%; height: 1pt; background: #E8DDD0; }
.m-points { margin: 0; padding: 0; }
.m-point { color: #6B5040; font-size: 9pt; line-height: 1.6; margin: 0; padding: 0; list-style: none; padding-left: 10pt; position: relative; }
.m-point::before { content: "·"; position: absolute; left: 0; color: #C4944A; }
.m-feature-row { display: flex; flex-direction: column; gap: 6pt; }
.m-feature { display: flex; align-items: flex-start; gap: 8pt; }
.m-f-label { background: #5C3D2E; border-radius: 2pt; padding: 2pt 6pt; min-width: 52pt; }
.m-f-label-text { color: #C4944A; font-size: 8pt; margin: 0; text-align: center; }
.m-f-text { color: #6B5040; font-size: 9pt; line-height: 1.5; margin: 0; }
.highlight { color: #C4944A; font-weight: bold; }
</style>
</head>
<body>
<div class="header">
  <div class="header-line"></div>
  <p class="header-title">核心成员介绍（三）</p>
</div>
<div class="members-row">
  <div class="member-card">
    <div class="m-top">
      <div class="m-avatar"><p class="m-avatar-text">黄</p></div>
      <div>
        <p class="m-name">黄辉</p>
        <p class="m-role">疑难病养老体系行政副院长</p>
      </div>
    </div>
    <div class="m-tags">
      <div class="m-tag"><p class="m-tag-text">运营实战专家</p></div>
      <div class="m-tag"><p class="m-tag-text">安全管理能手</p></div>
    </div>
    <div class="m-divider"></div>
    <div class="m-feature-row">
      <div class="m-feature">
        <div class="m-f-label"><p class="m-f-label-text">八年深耕</p></div>
        <p class="m-f-text">从一线护理员成长至副院长，熟悉机构运营全流程</p>
      </div>
      <div class="m-feature">
        <div class="m-f-label"><p class="m-f-label-text">专业资质</p></div>
        <p class="m-f-text">持有消防设施操作员中级证书，擅长消防安全与后勤保障</p>
      </div>
      <div class="m-feature">
        <div class="m-f-label"><p class="m-f-label-text">全面运营</p></div>
        <p class="m-f-text">负责消防安全、成本管控及护理员培训考核</p>
      </div>
    </div>
  </div>
  <div class="member-card">
    <div class="m-top">
      <div class="m-avatar"><p class="m-avatar-text">张</p></div>
      <div>
        <p class="m-name">张华</p>
        <p class="m-role">功能医学中心总经理</p>
      </div>
    </div>
    <div class="m-tags">
      <div class="m-tag"><p class="m-tag-text">大健康爆品打造专家</p></div>
      <div class="m-tag"><p class="m-tag-text">营销培训导师</p></div>
    </div>
    <div class="m-divider"></div>
    <div class="m-feature-row">
      <div class="m-feature">
        <div class="m-f-label"><p class="m-f-label-text">10亿级</p></div>
        <p class="m-f-text">成功将药食同源白牌饮品打造为明星单品</p>
      </div>
      <div class="m-feature">
        <div class="m-f-label"><p class="m-f-label-text">超2万人</p></div>
        <p class="m-f-text">拥有深厚销售人脉与行业资源，培训学员众多</p>
      </div>
      <div class="m-feature">
        <div class="m-f-label"><p class="m-f-label-text">0到1操盘</p></div>
        <p class="m-f-text">精通功能医学类产品爆品打造与私域渠道运作</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
