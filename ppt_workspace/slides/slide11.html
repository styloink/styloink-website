<!DOCTYPE html>
<html>
<head>
<style>
html, body { margin: 0; padding: 0; }
body {
  width: 720pt; height: 405pt;
  box-sizing: border-box;
  padding: 26pt 36pt 26pt 36pt;
  display: flex; flex-direction: column;
  overflow: hidden;
  background: #F8F4EE;
  font-family: Arial, sans-serif;
}
.header { display: flex; align-items: center; gap: 10pt; margin-bottom: 18pt; }
.header-line { width: 4pt; height: 20pt; background: #C4944A; }
.header-title { color: #5C3D2E; font-size: 14pt; font-weight: bold; font-family: Georgia, serif; margin: 0; }
.members-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16pt;
  flex: 1 1 0;
  min-height: 0;
}
.member-card {
  background: #fff;
  border: 1pt solid #D4B896;
  border-radius: 4pt;
  padding: 20pt 22pt;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: 10pt;
  min-height: 0;
  justify-content: center;
}
.m-top { display: flex; align-items: center; gap: 14pt; }
.m-avatar {
  width: 50pt; height: 50pt; border-radius: 50%;
  background: #5C3D2E;
  display: flex; align-items: center; justify-content: center;
  min-width: 50pt;
  border: 2pt solid #C4944A;
}
.m-avatar-text { color: #F8F4EE; font-size: 18pt; font-weight: bold; font-family: Georgia, serif; margin: 0; }
.m-name { color: #5C3D2E; font-size: 16pt; font-weight: bold; font-family: Georgia, serif; margin: 0; }
.m-role { color: #C4944A; font-size: 10pt; margin: 3pt 0 0 0; letter-spacing: 1pt; }
.m-divider { width: 100%; height: 1pt; background: #E8DDD0; }
.m-desc { color: #6B5040; font-size: 10pt; line-height: 1.7; margin: 0; }
</style>
</head>
<body>
<div class="header">
  <div class="header-line"></div>
  <p class="header-title">核心成员介绍（四）</p>
</div>
<div class="members-row">
  <div class="member-card">
    <div class="m-top">
      <div class="m-avatar"><p class="m-avatar-text">朱</p></div>
      <div>
        <p class="m-name">朱冠静</p>
        <p class="m-role">核心成员</p>
      </div>
    </div>
    <div class="m-divider"></div>
    <p class="m-desc">团队核心成员之一，在项目中承担关键职责，以专业能力和敬业精神推动业务发展。</p>
  </div>
  <div class="member-card">
    <div class="m-top">
      <div class="m-avatar"><p class="m-avatar-text">宋</p></div>
      <div>
        <p class="m-name">宋美华</p>
        <p class="m-role">核心成员</p>
      </div>
    </div>
    <div class="m-divider"></div>
    <p class="m-desc">团队核心成员之一，凭借丰富经验与卓越执行力，为团队目标达成提供坚实支撑。</p>
  </div>
</div>
</body>
</html>
