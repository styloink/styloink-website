<!DOCTYPE html>
<html>
<head>
<style>
html, body { margin: 0; padding: 0; }
body {
  width: 720pt; height: 405pt;
  box-sizing: border-box;
  padding: 26pt 36pt 26pt 36pt;
  display: flex; flex-direction: column;
  overflow: hidden;
  background: #F8F4EE;
  font-family: Arial, sans-serif;
}
.header { display: flex; align-items: center; gap: 10pt; margin-bottom: 18pt; }
.header-line { width: 4pt; height: 20pt; background: #C4944A; }
.header-title { color: #5C3D2E; font-size: 14pt; font-weight: bold; font-family: Georgia, serif; margin: 0; }
.members-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16pt;
  flex: 1 1 0;
  min-height: 0;
}
.member-card {
  background: #fff;
  border: 1pt solid #D4B896;
  border-radius: 4pt;
  padding: 16pt 18pt;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: 8pt;
  min-height: 0;
}
.m-top { display: flex; align-items: center; gap: 12pt; }
.m-avatar {
  width: 44pt; height: 44pt; border-radius: 50%;
  background: #8B5E3C;
  display: flex; align-items: center; justify-content: center;
  min-width: 44pt;
}
.m-avatar-text { color: #F8F4EE; font-size: 16pt; font-weight: bold; font-family: Georgia, serif; margin: 0; }
.m-name { color: #5C3D2E; font-size: 14pt; font-weight: bold; font-family: Georgia, serif; margin: 0; }
.m-role { color: #C4944A; font-size: 9pt; margin: 2pt 0 0 0; letter-spacing: 1pt; }
.m-tags { display: flex; gap: 6pt; flex-wrap: wrap; }
.m-tag {
  background: #F0E8DE; border: 1pt solid #D4B896; border-radius: 2pt;
  padding: 2pt 8pt;
}
.m-tag-text { color: #8B5E3C; font-size: 8.5pt; margin: 0; }
.m-divider { width: 100%; height: 1pt; background: #E8DDD0; }
.m-points { margin: 0; padding: 0; }
.m-point { color: #6B5040; font-size: 9pt; line-height: 1.6; margin: 0; padding: 0; list-style: none; padding-left: 10pt; position: relative; }
.m-point::before { content: "·"; position: absolute; left: 0; color: #C4944A; }
.highlight { color: #C4944A; font-weight: bold; }
</style>
</head>
<body>
<div class="header">
  <div class="header-line"></div>
  <p class="header-title">核心成员介绍（二）</p>
</div>
<div class="members-row">
  <div class="member-card">
    <div class="m-top">
      <div class="m-avatar"><p class="m-avatar-text">武</p></div>
      <div>
        <p class="m-name">武静</p>
        <p class="m-role">疑难病咨询诊疗中心行政办公室主任</p>
      </div>
    </div>
    <div class="m-tags">
      <div class="m-tag"><p class="m-tag-text">政企关系协调专家</p></div>
      <div class="m-tag"><p class="m-tag-text">医疗运营负责人</p></div>
    </div>
    <div class="m-divider"></div>
    <ul class="m-points">
      <li class="m-point">十余年跨行业综合管理经验，精通政府关系协调与政策研究</li>
      <li class="m-point">现任南京朴润医疗运营负责人，熟悉医疗项目全流程</li>
      <li class="m-point">具备从0到1建立政企合作渠道的经验</li>
    </ul>
  </div>
  <div class="member-card">
    <div class="m-top">
      <div class="m-avatar"><p class="m-avatar-text">刘</p></div>
      <div>
        <p class="m-name">刘振伟</p>
        <p class="m-role">疑难病养老体系院长</p>
      </div>
    </div>
    <div class="m-tags">
      <div class="m-tag"><p class="m-tag-text">资深养老专家</p></div>
      <div class="m-tag"><p class="m-tag-text">国家级技能竞赛获奖者</p></div>
    </div>
    <div class="m-divider"></div>
    <ul class="m-points">
      <li class="m-point">十余年养老行业实战经验，覆盖一线照护到项目操盘全链条</li>
      <li class="m-point">全国首批高级养老护理员，荣获<span class="highlight">"江苏省最美养老护理员"</span></li>
      <li class="m-point">统筹<span class="highlight">15家</span>养护机构渠道运营</li>
    </ul>
  </div>
</div>
</body>
</html>
