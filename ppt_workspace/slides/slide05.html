<!DOCTYPE html>
<html>
<head>
<style>
html, body { margin: 0; padding: 0; }
body {
  width: 720pt; height: 405pt;
  box-sizing: border-box;
  padding: 28pt 36pt 28pt 36pt;
  display: flex; flex-direction: column;
  overflow: hidden;
  background: #F8F4EE;
  font-family: Arial, sans-serif;
}
.header {
  display: flex;
  align-items: center;
  gap: 10pt;
  margin-bottom: 20pt;
}
.header-line { width: 4pt; height: 20pt; background: #C4944A; }
.header-title {
  color: #5C3D2E; font-size: 14pt; font-weight: bold;
  font-family: Georgia, serif; margin: 0;
}
.header-sub { color: #8B5E3C; font-size: 10pt; margin: 0 0 0 8pt; }
.main-row {
  display: grid;
  grid-template-columns: 200pt 1fr;
  gap: 20pt;
  flex: 1 1 0;
  min-height: 0;
}
.left-panel {
  background: #5C3D2E;
  border-radius: 4pt;
  padding: 20pt 18pt;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 10pt;
  min-height: 0;
}
.brand-name {
  color: #F8F4EE; font-size: 22pt; font-weight: bold;
  font-family: Georgia, serif; margin: 0; letter-spacing: 2pt;
}
.brand-tag {
  background: #C4944A; display: inline-block;
  padding: 3pt 10pt; border-radius: 2pt; margin: 4pt 0;
}
.brand-tag-text {
  color: #fff; font-size: 9pt; letter-spacing: 1pt; margin: 0;
}
.brand-desc {
  color: #D4B896; font-size: 10pt; line-height: 1.6; margin: 0;
}
.right-panel {
  display: flex;
  flex-direction: column;
  gap: 10pt;
  min-height: 0;
}
.feature-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10pt;
  flex: 1 1 0;
  min-height: 0;
}
.feature-card {
  background: #fff;
  border: 1pt solid #D4B896;
  border-top: 3pt solid #C4944A;
  border-radius: 3pt;
  padding: 10pt 12pt;
  box-sizing: border-box;
  min-height: 0;
  display: flex;
  flex-direction: column;
  gap: 5pt;
}
.feat-title {
  color: #5C3D2E; font-size: 11pt; font-weight: bold;
  font-family: Georgia, serif; margin: 0;
}
.feat-desc {
  color: #7A6050; font-size: 9pt; line-height: 1.5; margin: 0;
}
.cycle-card {
  background: #5C3D2E;
  border-radius: 3pt;
  padding: 8pt 14pt;
  display: flex;
  align-items: center;
  gap: 10pt;
}
.cycle-label { color: #C4944A; font-size: 9pt; letter-spacing: 1pt; margin: 0; }
.cycle-text { color: #F8F4EE; font-size: 10pt; margin: 0; }
</style>
</head>
<body>
<div class="header">
  <div class="header-line"></div>
  <p class="header-title">泰禾康</p>
  <p class="header-sub">——&nbsp;您身边的健康管理专家</p>
</div>
<div class="main-row">
  <div class="left-panel">
    <p class="brand-name">泰禾康</p>
    <div class="brand-tag"><p class="brand-tag-text">核心品牌</p></div>
    <p class="brand-desc">专注于提供专业健康管理与养生保健服务的科技型企业，区域内颇具口碑的健康服务标杆。</p>
    <div class="brand-tag" style="background:#8B5E3C;"><p class="brand-tag-text">整合医疗健康养老</p></div>
  </div>
  <div class="right-panel">
    <div class="feature-row">
      <div class="feature-card">
        <p class="feat-title">健康咨询服务</p>
        <p class="feat-desc">个性化方案定制，专业团队一对一健康指导</p>
      </div>
      <div class="feature-card">
        <p class="feat-title">健康产品研发</p>
        <p class="feat-desc">医疗器械、健康消费品等优质健康产品供应</p>
      </div>
      <div class="feature-card">
        <p class="feat-title">社区化网络</p>
        <p class="feat-desc">打造"家门口的健康管家"，便捷可及的社区服务</p>
      </div>
    </div>
    <div class="cycle-card">
      <p class="cycle-label">全周期体系</p>
      <p class="cycle-text">评估 → 调理 → 养护，覆盖健康管理全流程，拒绝"一刀切"，量身定制</p>
    </div>
  </div>
</div>
</body>
</html>
