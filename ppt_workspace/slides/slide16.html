<!DOCTYPE html>
<html>
<head>
<style>
html, body { margin: 0; padding: 0; }
body {
  width: 720pt; height: 405pt;
  box-sizing: border-box;
  padding: 26pt 36pt 24pt 36pt;
  display: flex; flex-direction: column;
  overflow: hidden;
  background: #F8F4EE;
  font-family: Arial, sans-serif;
}
.header { display: flex; align-items: center; gap: 10pt; margin-bottom: 18pt; }
.header-line { width: 4pt; height: 20pt; background: #C4944A; }
.header-title { color: #5C3D2E; font-size: 14pt; font-weight: bold; font-family: Georgia, serif; margin: 0; }
.header-sub { color: #8B5E3C; font-size: 10pt; margin: 0 0 0 8pt; }
.modules-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14pt;
  flex: 1 1 0;
  min-height: 0;
}
.mod-card {
  background: #fff;
  border: 1pt solid #D4B896;
  border-top: 4pt solid #C4944A;
  border-radius: 4pt;
  padding: 16pt 14pt;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: 8pt;
  min-height: 0;
}
.mod-title { color: #5C3D2E; font-size: 13pt; font-weight: bold; font-family: Georgia, serif; margin: 0; }
.mod-divider { width: 100%; height: 1pt; background: #E8DDD0; }
.mod-tags { display: flex; flex-wrap: wrap; gap: 6pt; }
.mod-tag {
  background: #F0E8DE;
  border: 1pt solid #D4B896;
  border-radius: 2pt;
  padding: 3pt 8pt;
}
.mod-tag-text { color: #8B5E3C; font-size: 9pt; margin: 0; }
.mod-points { margin: 0; padding: 0; }
.mod-point {
  color: #6B5040; font-size: 9pt; line-height: 1.6; margin: 0;
  padding: 0; list-style: none; padding-left: 10pt; position: relative;
}
.mod-point::before { content: "·"; position: absolute; left: 0; color: #C4944A; }
</style>
</head>
<body>
<div class="header">
  <div class="header-line"></div>
  <p class="header-title">核心业务模块</p>
  <p class="header-sub">—— 特色专科中心</p>
</div>
<div class="modules-row">
  <div class="mod-card">
    <p class="mod-title">口腔专护管理</p>
    <div class="mod-divider"></div>
    <ul class="mod-points">
      <li class="mod-point">口腔健康评估</li>
      <li class="mod-point">中医特色护齿方案</li>
      <li class="mod-point">日常护理指导</li>
    </ul>
  </div>
  <div class="mod-card">
    <p class="mod-title">睡眠管理</p>
    <div class="mod-divider"></div>
    <div class="mod-tags">
      <div class="mod-tag"><p class="mod-tag-text">针灸</p></div>
      <div class="mod-tag"><p class="mod-tag-text">推拿</p></div>
      <div class="mod-tag"><p class="mod-tag-text">中药</p></div>
      <div class="mod-tag"><p class="mod-tag-text">认知行为</p></div>
    </div>
    <ul class="mod-points">
      <li class="mod-point">中医特色疗法</li>
      <li class="mod-point">现代疗法有机结合</li>
    </ul>
  </div>
  <div class="mod-card">
    <p class="mod-title">创面管理</p>
    <div class="mod-divider"></div>
    <div class="mod-tags">
      <div class="mod-tag"><p class="mod-tag-text">并发症</p></div>
      <div class="mod-tag"><p class="mod-tag-text">半失能</p></div>
      <div class="mod-tag"><p class="mod-tag-text">失能</p></div>
    </div>
    <ul class="mod-points">
      <li class="mod-point">专业创面护理</li>
      <li class="mod-point">康复服务</li>
    </ul>
  </div>
</div>
</body>
</html>
