<!DOCTYPE html>
<html>
<head>
<style>
html, body { margin: 0; padding: 0; }
body {
  width: 720pt; height: 405pt;
  box-sizing: border-box;
  padding: 30pt 40pt 32pt 40pt;
  display: flex; flex-direction: column;
  overflow: hidden;
  background: #F8F4EE;
  font-family: Arial, sans-serif;
}
.header {
  display: flex;
  align-items: center;
  gap: 10pt;
  margin-bottom: 24pt;
}
.header-line { width: 4pt; height: 20pt; background: #C4944A; }
.header-title {
  color: #5C3D2E; font-size: 15pt; font-weight: bold;
  font-family: Georgia, serif; margin: 0; letter-spacing: 1pt;
}
.header-sub {
  color: #8B5E3C; font-size: 10pt; margin: 0 0 0 8pt; letter-spacing: 1pt;
}
.vision-banner {
  background: #5C3D2E;
  border-radius: 3pt;
  padding: 10pt 20pt;
  margin-bottom: 20pt;
  display: flex;
  align-items: center;
  gap: 10pt;
}
.vision-label {
  color: #C4944A; font-size: 9pt; letter-spacing: 2pt; margin: 0;
}
.vision-text {
  color: #F8F4EE; font-size: 13pt; font-weight: bold;
  font-family: Georgia, serif; margin: 0;
}
.cards-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18pt;
  flex: 1 1 0;
  min-height: 0;
}
.card {
  background: #fff;
  border: 1pt solid #D4B896;
  border-radius: 4pt;
  padding: 18pt 20pt;
  box-sizing: border-box;
  min-height: 0;
  display: flex;
  flex-direction: column;
  gap: 8pt;
}
.card-top {
  display: flex;
  align-items: center;
  gap: 10pt;
  margin-bottom: 8pt;
}
.card-icon {
  width: 32pt; height: 32pt;
  background: #C4944A;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-icon-text {
  color: #fff; font-size: 13pt; font-weight: bold;
  font-family: Georgia, serif; margin: 0;
}
.card-brand {
  color: #5C3D2E; font-size: 14pt; font-weight: bold;
  font-family: Georgia, serif; margin: 0;
}
.card-role {
  color: #C4944A; font-size: 9pt; margin: 0; letter-spacing: 1pt;
}
.card-divider { width: 100%; height: 1pt; background: #E8DDD0; }
.card-desc {
  color: #6B5040; font-size: 10pt; line-height: 1.6; margin: 0;
}
</style>
</head>
<body>
<div class="header">
  <div class="header-line"></div>
  <p class="header-title">我们的愿景</p>
  <p class="header-sub">携手共进，共创健康未来</p>
</div>
<div class="vision-banner">
  <p class="vision-label">VISION</p>
  <p class="vision-text">携手共进，共创健康未来 —— 现代与传统的完美融合</p>
</div>
<div class="cards-row">
  <div class="card">
    <div class="card-top">
      <div class="card-icon"><p class="card-icon-text">康</p></div>
      <div>
        <p class="card-brand">泰禾康</p>
        <p class="card-role">现代健康管理先行者</p>
      </div>
    </div>
    <div class="card-divider"></div>
    <p class="card-desc">专注现代健康管理，以科学方法引领健康生活方式，打造个性化健康解决方案。</p>
  </div>
  <div class="card">
    <div class="card-top">
      <div class="card-icon"><p class="card-icon-text">润</p></div>
      <div>
        <p class="card-brand">朴润中医馆</p>
        <p class="card-role">传统中医智慧传承者</p>
      </div>
    </div>
    <div class="card-divider"></div>
    <p class="card-desc">传承千年中医智慧，融合传统诊疗精髓，提供自然调理与体质养护服务。</p>
  </div>
</div>
</body>
</html>
